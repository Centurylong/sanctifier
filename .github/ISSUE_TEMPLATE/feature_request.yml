name: Feature Request
description: Suggest a new feature or improvement
title: "[feat] "
labels: ["type: enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - sanctifier-core (static analysis)
        - sanctifier-cli (CLI tool)
        - runtime-guard (Soroban contracts)
        - frontend
        - docs
        - ci/cd
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - easy
        - medium
        - hard
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
      placeholder: What pain point does this address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
