name: Bug Report
description: Something is broken or behaving unexpectedly
title: "[bug] "
labels: ["type: bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - sanctifier-core (static analysis)
        - sanctifier-cli (CLI tool)
        - runtime-guard (Soroban contracts)
        - frontend
        - docs
        - ci/cd
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - easy
        - medium
        - hard
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
        - critical
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `sanctifier analyze ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: Ubuntu 22.04
        - Rust: 1.78
        - sanctifier version: 0.1.0
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
